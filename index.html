<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AI Flow</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1e293b",
              "surface": "#f8fafc",
              "surface-container": "#f1f5f9",
              "on-surface": "#0f172a",
              "on-surface-variant": "#64748b",
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">
<div class="flex flex-col h-screen w-full p-6 md:p-10">
    
    <header class="flex items-center justify-between mb-8 shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-white shadow-sm">
                <span class="material-symbols-outlined text-[20px]">psychology</span>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-800 uppercase">AI FLOW</h1>
        </div>

        <div id="auth-section" class="flex items-center gap-4">
            <button id="login-btn" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 text-slate-700 font-bold rounded-xl shadow-sm hover:bg-slate-50 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                Sign In
            </button>

            <div id="user-profile" class="hidden flex items-center gap-4">
                <span id="user-name" class="text-sm font-bold text-slate-700"></span>
                <img id="user-avatar" src="" class="w-10 h-10 rounded-full border-2 border-slate-200 shadow-sm">
                <button id="logout-btn" class="p-2 text-slate-400 hover:text-red-500 transition-colors flex items-center justify-center" title="Sign out">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </div>
    </header>

    <div class="flex-1 flex gap-8 min-h-0">
        
        <aside class="w-64 flex flex-col gap-6 h-full">
            <button id="new-task-btn" class="flex items-center gap-3 px-5 py-3 bg-slate-800 text-white rounded-xl shadow-sm hover:bg-slate-700 transition-colors w-full shrink-0">
                <span class="material-symbols-outlined">add_circle</span>
                <span class="font-bold">New Task</span>
            </button>
            
            <div class="bg-white rounded-2xl flex flex-col border border-slate-200 overflow-hidden shadow-sm shrink-0" id="tool-menu">
                <button class="tool-btn text-left py-4 px-6 text-sm font-medium border-b border-slate-100 hover:bg-slate-50 transition-all text-slate-700">Summarize Text</button>
                <button class="tool-btn text-left py-4 px-6 text-sm font-medium border-b border-slate-100 hover:bg-slate-50 transition-all text-slate-700">Translate to Hindi</button>
                <button class="tool-btn text-left py-4 px-6 text-sm font-medium border-b border-slate-100 hover:bg-slate-50 transition-all text-slate-700">Make Professional</button>
                <button class="tool-btn text-left py-4 px-6 text-sm font-medium hover:bg-slate-50 transition-all text-slate-700">Fix Grammar</button>
            </div>

            <div class="flex flex-col flex-1 overflow-hidden mt-2">
                <div class="px-2 mb-3 text-xs font-bold text-slate-400 uppercase tracking-wider">Recent</div>
                <div id="sidebar-history-list" class="flex-col gap-1 overflow-y-auto no-scrollbar flex-1 flex pb-4 pr-2">
                    </div>
            </div>

            <div class="mt-auto pt-2 shrink-0">
                <button id="clear-history-btn" class="flex items-center justify-center gap-3 px-6 py-4 bg-white border border-slate-200 text-red-500 rounded-2xl w-full shadow-sm hover:bg-red-50 transition-all">
                    <span class="material-symbols-outlined text-[20px]">delete</span>
                    <span class="font-medium">Clear History</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col gap-6 max-w-5xl h-full min-h-0">
            
            <div class="flex-1 overflow-hidden bg-white rounded-[2rem] p-8 md:p-10 flex flex-col border border-slate-200 shadow-sm relative min-h-0">
                <div class="mb-8 border-b border-slate-100 pb-6 shrink-0">
                    <h2 class="text-lg font-bold italic text-slate-700" id="output-title">Final polished text generated by the AI</h2>
                </div>
                
                <div id="output-text" class="prose prose-slate max-w-none flex-1 overflow-y-auto no-scrollbar text-lg pb-10">
                    Select a tool from the left menu and run the AI to see your results here.
                </div>

                <div class="absolute bottom-6 right-8 flex gap-4 bg-white/90 backdrop-blur px-4 py-2 rounded-xl shadow-sm border border-slate-100">
                    <button id="copy-btn" class="flex items-center justify-center text-slate-400 hover:text-slate-800 transition-colors" title="Copy to clipboard">
                        <span class="material-symbols-outlined text-[22px]">content_copy</span>
                    </button>
                    <div class="w-px h-6 bg-slate-200"></div>
                    <button id="reset-btn" class="flex items-center justify-center text-slate-400 hover:text-slate-800 transition-colors" title="Reset workspace">
                        <span class="material-symbols-outlined text-[24px]">refresh</span>
                    </button>
                </div>
            </div> 

            <div class="shrink-0 min-h-[220px] bg-white rounded-[2rem] p-8 md:p-10 border border-slate-200 shadow-sm relative flex flex-col">
                <label class="text-lg text-slate-400 font-medium mb-4 shrink-0">Ask AI Flow</label>
                <textarea id="user-input" class="w-full flex-1 bg-transparent border-none focus:ring-0 p-0 text-xl text-slate-800 placeholder:text-slate-300 resize-none no-scrollbar outline-none" placeholder="Paste your text here..."></textarea>
                
                <div class="flex justify-between items-end mt-4 w-full shrink-0">
                    <div class="flex items-center gap-3">
                        <input type="file" id="file-upload" accept="image/*,.pdf,.txt,.doc,.docx" class="hidden">
                        <label for="file-upload" class="text-slate-400 hover:text-slate-800 transition-colors cursor-pointer flex items-center" title="Attach a file or image">
                            <span class="material-symbols-outlined text-3xl">attach_file</span>
                        </label>
                        <span id="file-name" class="text-sm font-medium text-slate-500 truncate max-w-[200px]"></span>
                    </div>
                    <button id="run-btn" class="px-10 py-3.5 bg-slate-800 text-white rounded-full font-bold text-lg hover:bg-slate-700 transition-all shadow-md">
                        Run AI
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
